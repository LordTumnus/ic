name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: front

      - name: Build frontend
        run: npm run build
        working-directory: front

      # Commit front/dist and move the tag so that the auto-generated
      # "Source Code" zip (used by MATLAB File Exchange) includes the
      # pre-built frontend.
      - name: Commit dist and retag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f front/dist

          # Remove front source/config (keep only front/dist) and tests
          git rm -rf --cached front/src front/node_modules front/.gitignore 2>/dev/null || true
          git rm --cached front/package.json front/package-lock.json 2>/dev/null || true
          git rm --cached front/tsconfig.json front/tsconfig.app.json front/tsconfig.node.json 2>/dev/null || true
          git rm --cached front/vite.config.ts front/svelte.config.js front/index.html 2>/dev/null || true
          git rm -rf --cached test 2>/dev/null || true

          git commit -m "Release ${GITHUB_REF_NAME}"

          # Move the tag to this new commit
          git tag -f "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}" --force

      - name: Package release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGING="ic-${VERSION}"

          # Copy everything, then remove what users don't need
          rsync -a --exclude='.git' --exclude='web' --exclude='test' ./ "$STAGING/"

          # Replace front source with just the built output
          rm -rf "$STAGING/front/node_modules" "$STAGING/front/src" "$STAGING/front/.gitignore"
          rm -f  "$STAGING/front/package.json" "$STAGING/front/package-lock.json"
          rm -f  "$STAGING/front/tsconfig.json" "$STAGING/front/tsconfig.app.json" "$STAGING/front/tsconfig.node.json"
          rm -f  "$STAGING/front/vite.config.ts" "$STAGING/front/svelte.config.js" "$STAGING/front/index.html"

          # Clean up dev/CI files
          rm -rf "$STAGING/.github" "$STAGING/.claude" "$STAGING/.vscode"

          zip -r "ic-${VERSION}.zip" "$STAGING"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ic-*.zip
          generate_release_notes: true
